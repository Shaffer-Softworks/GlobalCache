name: Create release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver (e.g. 1.0.1). A leading v is optional.
        required: true
        type: string
      draft:
        description: Create as draft release
        required: false
        type: boolean
        default: false
      prerelease:
        description: Mark as prerelease
        required: false
        type: boolean
        default: false
      release_notes:
        description: Release notes (optional). If empty, GitHub generates notes from commits.
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      branch: ${{ steps.meta.outputs.branch }}
    steps:
      - id: meta
        env:
          RAW: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${RAW#v}"
          if [ -z "$VERSION" ]; then
            echo "::error::version is empty"
            exit 1
          fi
          if [[ "$VERSION" == *"/"* ]]; then
            echo "::error::version must not contain /"
            exit 1
          fi
          TAG="v${VERSION}"
          BRANCH="release/${TAG}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

  release:
    needs: normalize
    runs-on: ubuntu-latest
    concurrency:
      group: create-release-${{ github.repository }}-${{ needs.normalize.outputs.version }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_TRIGGER_TOKEN != '' && secrets.WORKFLOW_TRIGGER_TOKEN || github.token }}

      - name: Bump manifest, push release branch, publish release
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_TRIGGER_TOKEN != '' && secrets.WORKFLOW_TRIGGER_TOKEN || github.token }}
          HAS_WORKFLOW_PAT: ${{ secrets.WORKFLOW_TRIGGER_TOKEN != '' }}
          VERSION: ${{ needs.normalize.outputs.version }}
          TAG: ${{ needs.normalize.outputs.tag }}
          BRANCH: ${{ needs.normalize.outputs.branch }}
          INPUT_DRAFT: ${{ github.event.inputs.draft }}
          INPUT_PRERELEASE: ${{ github.event.inputs.prerelease }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin "refs/heads/${BRANCH}:refs/remotes/origin/${BRANCH}" 2>/dev/null || true
          if git rev-parse "refs/remotes/origin/${BRANCH}" >/dev/null 2>&1; then
            git checkout -B "$BRANCH" "refs/remotes/origin/${BRANCH}"
          else
            git checkout -b "$BRANCH"
          fi

          export MANIFEST_VERSION="$VERSION"
          python3 << 'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["MANIFEST_VERSION"]
          path = Path("custom_components/globalcache_itach/manifest.json")
          with path.open(encoding="utf-8") as f:
              data = json.load(f)
          data["version"] = version
          path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY

          git add custom_components/globalcache_itach/manifest.json
          if git diff --staged --quiet; then
            echo "::notice::Manifest already at ${VERSION}; reusing existing release branch."
          else
            git commit -m "chore: bump manifest to ${VERSION} for ${TAG}"
          fi

          if git rev-parse "refs/remotes/origin/${BRANCH}" >/dev/null 2>&1; then
            git push -u origin "$BRANCH" --force-with-lease="refs/heads/${BRANCH}:refs/remotes/origin/${BRANCH}"
          else
            git push -u origin "$BRANCH"
          fi

          git fetch origin --tags
          HEAD_SHA=$(git rev-parse HEAD)
          if git show-ref --verify --quiet "refs/tags/${TAG}"; then
            TAG_SHA=$(git rev-parse "${TAG}^{}" 2>/dev/null || git rev-parse "refs/tags/${TAG}")
            if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
              echo "::error::Tag ${TAG} already exists at ${TAG_SHA}, but branch HEAD is ${HEAD_SHA}."
              exit 1
            fi
          fi

          EXTRA=( )
          if [ "$INPUT_DRAFT" = "true" ]; then EXTRA+=(--draft); fi
          if [ "$INPUT_PRERELEASE" = "true" ]; then EXTRA+=(--prerelease); fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::Release ${TAG} already exists; skipping release creation."
          elif [ -n "$RELEASE_NOTES" ]; then
            printf '%s\n' "$RELEASE_NOTES" > /tmp/release-notes.md
            gh release create "$TAG" --target "$BRANCH" --title "$TAG" -F /tmp/release-notes.md "${EXTRA[@]}"
          else
            gh release create "$TAG" --target "$BRANCH" --title "$TAG" --generate-notes "${EXTRA[@]}"
          fi

          if [ "$(gh pr list --head "$BRANCH" --state open --json number -q 'length')" -eq 0 ]; then
            if [ "${HAS_WORKFLOW_PAT}" = "true" ]; then
              gh pr create \
                --base "$DEFAULT_BRANCH" \
                --head "$BRANCH" \
                --title "Merge ${TAG} manifest bump" \
                --body "Automated manifest bump for [${TAG}](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}). Merge after checks pass."
            else
              PR_URL="https://github.com/${GITHUB_REPOSITORY}/compare/${DEFAULT_BRANCH}...${BRANCH}?expand=1"
              echo "::notice::GitHub Actions cannot create pull requests in this repository without WORKFLOW_TRIGGER_TOKEN. Open the manifest bump PR manually: ${PR_URL}"
              echo "Open the manifest bump PR manually: ${PR_URL}" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          if [ "${HAS_WORKFLOW_PAT}" != "true" ]; then
            gh workflow run validate.yaml --ref "$BRANCH"
          fi
